name: daily-fallback
# Redundancy for daily.yml. Fires 28 min after the main cron (23:45 UTC vs
# 23:17 UTC). If main fired and committed, this run sees state.date==today
# with no newly-discovered IDs and skips the email send (idempotent path
# in src/index.js). If main was delayed/dropped, this run ships the digest
# instead. Same workflow logic as daily.yml — only the schedule differs.
on:
  schedule:
    - cron: '45 23 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - run: npm ci

      - name: Run daily feed (fallback)
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_FROM:    ${{ secrets.RESEND_FROM }}
          RESEND_TO:      ${{ secrets.RESEND_TO }}
        run: node src/index.js

      - name: Commit feed + snapshot
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main
          git add data/ public/feed.json
          if git diff --cached --quiet; then
            echo "no changes to commit (likely a duplicate run after main succeeded)"
          else
            DATE=$(date -u +%Y-%m-%d)
            git commit -m "feed: ${DATE} (fallback)"
            git push
          fi
