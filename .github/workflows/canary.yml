name: canary
# Detects silent dropouts of the daily-feed cron. Fires at 00:30 UTC,
# ~73 min after the main cron's 23:17 UTC fire, and verifies that the
# latest commit on main is the expected "feed: YYYY-MM-DD".
on:
  schedule:
    - cron: '30 0 * * *'
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Verify latest commit + alert if missing
        env:
          RESEND_API_KEY:    ${{ secrets.RESEND_API_KEY }}
          RESEND_FROM:       ${{ secrets.RESEND_FROM }}
          RESEND_TO:         ${{ secrets.RESEND_TO }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: node scripts/canary-check.js
